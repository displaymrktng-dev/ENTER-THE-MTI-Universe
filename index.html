<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTI Universe</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <link rel="icon" type="image/png" href="/icon-32.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        // CRM Logic: Volatile flag for page-load reset
        window._mtiDismissed = false;
        let interactionCount = 0;

        function handleVaultInteraction() {
            interactionCount++;
            const captured = sessionStorage.getItem('mtiCaptured');

            // Trigger on 2nd interaction if not dismissed/captured
            if (interactionCount >= 2 && !window._mtiDismissed && !captured) {
                showCRMModal();
            }
        }

        function showCRMModal() {
            // Modal trigger logic here
            console.log("MTI Universe: Initializing Lead Capture...");
        }

        function dismissModal() {
            window._mtiDismissed = true;
        }

        function submitEmail() {
            sessionStorage.setItem('mtiCaptured', 'true');
        }
    </script>
</head>
