<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-32.png">

  <script>
    // Logic: window._mtiDismissed resets on every fresh page load.
    // Logic: sessionStorage['mtiCaptured'] persists until the tab/session is closed.
    window._mtiDismissed = false;
    let cardClickCount = 0;

    function handleCardClick() {
      cardClickCount++;
      
      const isCaptured = sessionStorage.getItem('mtiCaptured');
      
      // Trigger modal on 2nd click if not dismissed this load AND not already captured
      if (cardClickCount >= 2 && !window._mtiDismissed && !isCaptured) {
        triggerCRMMonitor();
      }
    }

    function triggerCRMMonitor() {
      // Implementation for modal display
      console.log("MTI Universe: Capturing Digital Outreach Lead...");
    }

    function onEmailSubmit() {
      sessionStorage.setItem('mtiCaptured', 'true');
      // Hide modal
    }

    function onModalDismiss() {
      window._mtiDismissed = true;
    }
  </script>
</head>
