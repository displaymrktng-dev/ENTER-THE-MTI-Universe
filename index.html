  <defs>

    <!-- Deep space background gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00000f"/>
      <stop offset="60%"  stop-color="#020208"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Volt glow for logo mark -->
    <radialGradient id="voltGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d4ff00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4ff00" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizon ember glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"  stop-color="#ff4d00" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Vault card glow -->
    <radialGradient id="cardGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d4ff00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Subtle blur for glow elements -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <filter id="starGlow">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>

  </defs>
